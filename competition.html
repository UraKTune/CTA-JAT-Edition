<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competition — osu! Tournament</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .challenge-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 820px) { .challenge-layout { grid-template-columns: 1fr; } }

    .challenge-info {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .challenge-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }
    .challenge-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 99px; font-size: 0.78rem; font-weight: 500;
      padding: 0.25rem 0.75rem; color: var(--text2);
    }
    .meta-pill.sort-asc  { color: var(--accent3); border-color: rgba(0,212,255,0.3); }
    .meta-pill.sort-desc { color: var(--accent);  border-color: rgba(255,107,157,0.3); }

    .challenge-content { font-size: 0.92rem; color: var(--text2); line-height: 1.7; }
    .challenge-note {
      font-size: 0.82rem; color: var(--gold);
      background: rgba(255,209,102,0.08);
      border-left: 2px solid var(--gold);
      padding: 0.5rem 0.8rem;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .challenge-files { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .file-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.78rem; color: var(--accent3);
      background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
      border-radius: var(--radius-sm); padding: 0.25rem 0.65rem;
      text-decoration: none; transition: background 0.15s;
    }
    .file-link:hover { background: rgba(0,212,255,0.15); text-decoration: none; }

    /* Submit panel */
    .submit-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: sticky;
      top: calc(var(--nav-h) + 1rem);
    }
    .submit-title {
      font-family: var(--font-display);
      font-weight: 700; font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    /* Recent scores list */
    .recent-scores-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text3);
      margin-bottom: 0.4rem;
    }
    .score-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.7rem;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      margin-bottom: 0.35rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s;
      font-size: 0.83rem;
    }
    .score-item:hover { border-color: var(--accent3); }
    .score-item.selected { border-color: var(--accent); background: rgba(255,107,157,0.07); }
    .score-item-left { display: flex; flex-direction: column; gap: 0.1rem; }
    .score-item-val {
      font-family: var(--font-display);
      font-weight: 700; color: var(--text);
    }
    .score-item-meta { font-size: 0.75rem; color: var(--text3); }
    .score-item-rank {
      font-family: var(--font-display);
      font-weight: 800; font-size: 0.8rem;
      color: var(--accent2);
    }

    .submit-hint { font-size: 0.78rem; color: var(--text3); line-height: 1.5; }
    .submit-hint strong { color: var(--text2); }

    .my-score-display {
      background: var(--bg3); border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .my-score-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
    .my-score-val { font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; color: var(--accent); }

    .submit-btn-wrap .btn-primary { width: 100%; justify-content: center; }

    /* Mini leaderboard */
    .mini-lb-title {
      font-family: var(--font-display); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3);
      padding-top: 1rem; border-top: 1px solid var(--border);
    }
    .mini-lb-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .mini-lb-row:last-child { border-bottom: none; }
    .mini-rank {
      font-family: var(--font-display); font-weight: 800; font-size: 0.9rem;
      min-width: 1.4rem; text-align: center;
    }
    .mini-lb-row img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
    .mini-name { flex: 1; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-pts  { font-family: var(--font-display); font-weight: 700; font-size: 0.85rem; color: var(--accent); }
    .mini-raw  { font-size: 0.72rem; color: var(--text3); }

    .fetch-btn {
      width: 100%;
      justify-content: center;
      font-size: 0.82rem;
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">osu<span>!</span>Tournament</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="puzzle.html">Puzzle</a>
    <a href="competition.html" class="active">Competition</a>
    <a href="leaderboard.html">Leaderboard</a>
  </div>
  <div id="nav-auth"></div>
</nav>

<main class="page">
  <h1 class="section-title">Competition</h1>
  <p class="section-sub">5 challenge thi đấu — nộp kết quả để leo bảng xếp hạng</p>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</main>

<div id="toast"></div>
<script src="env.js"></script>
<script src="app.js"></script>
<script>
  let CHALLENGES = [];

  let selectedPlay = {};

  // ---- Build UI sau khi load challenges.json ----
  function buildUI() {
    const tabsEl   = document.getElementById('tabs');
    const panelsEl = document.getElementById('panels');

    tabsEl.innerHTML = CHALLENGES.map((c, i) => `
      <button class="tab-btn ${i === 0 ? 'active' : ''}"
              onclick="switchTab(${i})" id="tab-${i}">
        ${c.name}
      </button>`).join('');

    panelsEl.innerHTML = CHALLENGES.map((c, i) => `
      <div class="tab-panel ${i === 0 ? 'active' : ''}" id="panel-${i}">
        <div class="challenge-layout">

          <!-- INFO -->
          <div class="challenge-info">
            <div class="challenge-name">${c.name}</div>
            <div class="challenge-meta">
              <span class="meta-pill sort-${c.sortOrder}">
                ${c.sortOrder === 'desc' ? '↑ Cao hơn = tốt hơn' : '↓ Thấp hơn = tốt hơn'}
              </span>
              <span class="meta-pill">${c.scoreLabel}</span>
            </div>
            <div class="challenge-content">${c.content}</div>
            ${c.note ? `<div class="challenge-note">⚠ ${c.note}</div>` : ''}
            ${c.files.length ? `
              <div class="challenge-files">
                ${c.files.map(f =>
                  `<a class="file-link" href="${f.url}" target="_blank">↗ ${f.label}</a>`
                ).join('')}
              </div>` : ''}
          </div>

          <!-- SUBMIT + MINI LB -->
          <div class="submit-panel">
            <div class="submit-title">Nộp kết quả</div>

            <div class="my-score-display">
              <span class="my-score-label">Kết quả hiện tại</span>
              <span class="my-score-val" id="my-score-${i}">—</span>
            </div>

            <!-- Fetch recent plays từ osu! -->
            <div>
              <div class="recent-scores-title">10 plays gần nhất của bạn</div>
              <div id="recent-scores-${i}">
                <button class="btn-secondary fetch-btn"
                        onclick="fetchRecentScores(${i}, this)">
                  Tải plays từ osu! →
                </button>
              </div>
            </div>

            <div class="submit-hint">
              Chọn 1 play từ danh sách trên rồi nhấn Submit.
              <strong>${c.sortOrder === 'desc' ? 'Cao hơn' : 'Thấp hơn'}</strong> sẽ được ưu tiên.
            </div>

            <div class="submit-btn-wrap">
              <button class="btn-primary" onclick="submitChallenge(${i}, this)">
                Submit →
              </button>
            </div>

            <div class="mini-lb-title">Leaderboard challenge này</div>
            <div id="mini-lb-${i}">
              <div style="color:var(--text3);font-size:0.82rem;padding:0.5rem 0">Đang tải...</div>
            </div>
          </div>

        </div>
      </div>`).join('');
  }

  // ---- Tabs ----
  function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', i === idx));
    document.querySelectorAll('.tab-panel').forEach((p, i) =>
      p.classList.toggle('active', i === idx));
  }

  // ---- Fetch 10 recent scores từ osu! qua GAS ----
  async function fetchRecentScores(challengeIdx, btn) {
    const user = getUser();
    if (!user) { showToast('Bạn cần đăng nhập trước!', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Đang tải...';

    const res = await fetchRecentPlays(challengeIdx);

    const container = document.getElementById(`recent-scores-${challengeIdx}`);

    if (!res || !res.ok || !res.plays || res.plays.length === 0) {
      container.innerHTML = `<div style="color:var(--text3);font-size:0.82rem;padding:0.4rem 0">
        Không có play nào trên map này trong 10 lần chơi gần nhất của bạn. Hãy chơi map rồi thử lại!</div>
        <button class="btn-secondary fetch-btn" style="margin-top:0.5rem"
                onclick="fetchRecentScores(${challengeIdx}, this)">Thử lại</button>`;
      return;
    }

    const c = CHALLENGES[challengeIdx];
    container.innerHTML = res.plays.map((s, i) => {
      // Hiển thị giá trị phù hợp tùy scoreType
      const displayVal = getDisplayVal(s, c.scoreType);
      const date = new Date(s.created_at).toLocaleDateString('vi-VN');
      return `
        <div class="score-item" id="score-item-${challengeIdx}-${i}"
             onclick="selectPlay(${challengeIdx}, ${i}, ${s.score_val}, this)">
          <div class="score-item-left">
            <span class="score-item-val">${displayVal}</span>
            <span class="score-item-meta">${date} · ${s.mods || 'NoMod'}</span>
          </div>
          <span class="score-item-rank">${s.rank || ''}</span>
        </div>`;
    }).join('');
  }

  function getDisplayVal(score, scoreType) {
    switch (scoreType) {
      case 'score':      return Number(score.score).toLocaleString('vi-VN');
      case 'accuracy':   return score.accuracy.toFixed(2) + '%';
      case 'miss_count': return score.statistics?.countmiss + ' miss' || '—';
      case '50s':        return score.statistics?.count50 + ' meh' || '—';
      default:           return score.score_val;
    }
  }

  function selectPlay(challengeIdx, itemIdx, scoreVal, el) {
    // Bỏ chọn cũ
    document.querySelectorAll(`#recent-scores-${challengeIdx} .score-item`)
      .forEach(el => el.classList.remove('selected'));
    el.classList.add('selected');
    selectedPlay[challengeIdx] = scoreVal;
  }

  // ---- Submit ----
  async function submitChallenge(challengeIdx, btn) {
    const user = getUser();
    if (!user) { showToast('Bạn cần đăng nhập trước!', 'error'); return; }

    const score = selectedPlay[challengeIdx];
    if (score === undefined || score === null) {
      showToast('Hãy chọn 1 play từ danh sách!', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Đang gửi...';

    const res = await submitScore(challengeIdx, score);
    if (res && res.ok) {
      if (res.updated === false) {
        showToast(`Score này không tốt hơn kết quả hiện tại (${fmtScore(res.currentScore)})`, 'error');
      } else {
        document.getElementById(`my-score-${challengeIdx}`).textContent =
          fmtScore(score);
        showToast('✓ Đã ghi nhận kết quả mới!', 'success');
        delete selectedPlay[challengeIdx];
        await loadLeaderboards();
      }
    } else {
      showToast('Có lỗi xảy ra, thử lại sau.', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Submit →';
  }

  // ---- Load leaderboard ----
  async function loadLeaderboards() {
    const res = await fetchLeaderboard();
    if (!res || !res.ok) return;

    // Mini leaderboard mỗi challenge: sắp xếp theo total vì GAS đã tính
    CHALLENGES.forEach((c, i) => {
      const sorted = res.data
        .filter(p => (p.comp_point || 0) > 0)
        .sort((a, b) => b.total - a.total);
      renderMiniLb(i, sorted);
    });

    // Cập nhật "kết quả hiện tại" của user
    const user = getUser();
    if (user) {
      const me = res.data.find(p => String(p.osu_id) === String(user.uid));
      if (me) {
        CHALLENGES.forEach((_, i) => {
          const el = document.getElementById(`my-score-${i}`);
          if (el) el.textContent = me.comp_point ? me.comp_point + ' point' : '—';
        });
      }
    }
  }

  function renderMiniLb(challengeIdx, players) {
    const el = document.getElementById(`mini-lb-${challengeIdx}`);
    const rankColors = ['rank-1', 'rank-2', 'rank-3'];

    if (!players || players.length === 0) {
      el.innerHTML = '<div style="color:var(--text3);font-size:0.82rem;padding:0.5rem 0">Chưa có ai tham gia</div>';
      return;
    }

    el.innerHTML = players.slice(0, 10).map((p, i) => `
      <div class="mini-lb-row">
        <span class="mini-rank ${rankColors[i] || ''}">${i + 1}</span>
        <img src="https://a.ppy.sh/${p.osu_id}" alt="${p.name}"
             onerror="this.src='https://osu.ppy.sh/assets/images/favicon-32x32.png'">
        <span class="mini-name">${p.name}</span>
        <span class="mini-pts">${p.comp_point || 0} point</span>
      </div>`).join('');
  }

  // ---- Toast ----
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 3000);
  }

  // ---- Init ----
  async function init() {
    // Load nội dung hiển thị từ challenges.json
    const jsonRes = await fetch('challenges.json');
    CHALLENGES = await jsonRes.json();

    // Merge sortOrder + scoreLabel từ GAS (nơi lưu logic tính điểm)
    try {
      const cfgRes = await apiGet({ action: 'getChallengeConfig' });
      if (cfgRes && cfgRes.ok) {
        cfgRes.data.forEach(gasCfg => {
          const local = CHALLENGES.find(c => c.id === gasCfg.id);
          if (local) {
            local.sortOrder  = gasCfg.sortOrder;
            local.scoreLabel = gasCfg.scoreLabel;
            local.scoreType  = gasCfg.scoreType;
          }
        });
      }
    } catch (e) {
      // GAS chưa sẵn sàng → dùng fallback sortOrder từ challenges.json nếu có
      console.warn('Không lấy được config từ GAS:', e);
    }

    buildUI();
    await loadLeaderboards();
    setInterval(loadLeaderboards, 60000);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
